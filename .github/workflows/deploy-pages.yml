# Статический сайт PALOMA → GitHub Pages
# После первого push: Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # GitHub Pages периодически отдаёт транзиентную ошибку
      # «Deployment failed, try again later» — публикуем с авто-ретраем
      # (3 попытки с паузами), чтобы не пушить ручные retrigger-коммиты.
      - name: Deploy (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before final retry
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 45

      - name: Deploy (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
