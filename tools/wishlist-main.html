  <main id="main" class="wishlist-page">
    <div class="container wishlist-page__container">
      <header class="wishlist-page__header">
        <span class="wishlist-page__eyebrow">[ Личное ]</span>
        <h1 class="wishlist-page__title">Избранное</h1>
        <p class="wishlist-page__lead" id="wishlistLead" hidden></p>
      </header>

      <div class="catalog-grid wishlist-grid" id="wishlistGrid" hidden></div>

      <div class="wishlist-empty" id="wishlistEmpty" hidden>

          <svg viewBox="0 0 64 64" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.4">
            <path d="M32 56s-19-12-24-24C5 23 9 13 18 13c5 0 9 3 14 9 5-6 9-9 14-9 9 0 13 10 10 19-5 12-24 24-24 24z"/>
          </svg>
        </div>
        <h2 class="wishlist-empty__title">В избранном пока пусто</h2>
        <p class="wishlist-empty__text">
          Отмечайте сердечком букеты, к которым хочется вернуться — они будут собираться здесь.
        </p>
        <a href="catalog.html" class="btn btn--dark wishlist-empty__cta">Перейти в каталог</a>
      </div>
    </div>
  </main>
