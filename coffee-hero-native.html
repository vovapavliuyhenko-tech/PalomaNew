<meta charset="UTF-8">

<title>PALOMA Coffee — hero в стиле НЭТИВ (галерейная карусель)</title>
<link rel="stylesheet" href="fonts/paloma-fonts.css?v=w1">
<style>
:root{
  --paper:#FFFFFF;--paper2:#FFFFFF;--ink:#1B1A18;--muted:#FFFFFF;
  --sage:#FFFFFF;--sage-d:#FFFFFF;
  --font-serif:'Cormorant',serif;--font-script:'Marck Script',cursive;--font-sans:'Manrope',sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
  --slds:.45s ease-in-out;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--paper);color:var(--ink);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(120% 100% at 50% 0%,#FFFFFF,var(--paper) 60%)}
img{display:block;width:100%;height:100%;object-fit:cover}
a{text-decoration:none;color:inherit}

.atelier{padding:clamp(24px,3vw,46px) 0 7vh}
.atelier__logo{text-align:center;margin-bottom:clamp(26px,3.4vw,48px);opacity:0;transform:translateY(-14px);animation:fadeDown 1s .1s var(--ease) forwards}
.atelier__logo h1{font-family:var(--font-serif);font-weight:400;letter-spacing:.14em;line-height:1;font-size:clamp(48px,7vw,104px);color:var(--ink)}
.atelier__logo p{font-family:var(--font-sans);font-weight:500;letter-spacing:.62em;font-size:clamp(11px,1vw,15px);text-transform:uppercase;color:var(--muted);margin-top:8px;padding-left:.62em}

/* ── ГАЛЕРЕЙНАЯ КАРУСЕЛЬ ── */
.gal{position:relative;width:100%;overflow:hidden}
.gal__track{display:flex;align-items:center;will-change:transform}
.gal__track.is-anim{transition:transform var(--slds)}
.gal__item{position:relative;flex:0 0 auto;border-radius:3px;overflow:hidden;background:var(--paper2);
  box-shadow:0 14px 32px rgba(52,54,44,.14);opacity:.95;
  transition:width var(--slds),height var(--slds),margin var(--slds),box-shadow var(--slds),opacity var(--slds)}
.gal__item img{transition:transform 7s linear}
.gal__item.is-active{border-radius:4px;opacity:1;box-shadow:0 36px 78px rgba(52,54,44,.24)}
.gal__item.is-active img{transform:scale(1.04)}

/* кнопка «Меню» поверх ленты */
.gal__btn{position:absolute;top:5%;left:clamp(20px,3vw,56px);z-index:5;display:flex;align-items:center;justify-content:center;gap:12px;
  width:clamp(220px,30vw,360px);min-height:clamp(64px,6.5vw,88px);background:rgba(139,141,112,.92);color:#FFFFFF;border-radius:4px;
  font-size:clamp(15px,1.2vw,19px);font-weight:500;letter-spacing:.04em;box-shadow:0 18px 40px rgba(52,54,44,.2);backdrop-filter:blur(2px);
  transition:background .4s var(--ease),transform .4s var(--ease);opacity:0;animation:fadeIn 1s .5s var(--ease) forwards}
.gal__btn:hover{background:var(--sage-d);transform:translateY(-3px)}
.gal__btn svg{width:20px;height:20px;stroke:#FFFFFF;fill:none;stroke-width:1.4}

.gal__sign{text-align:center;font-family:var(--font-script);font-size:clamp(26px,2.4vw,40px);color:var(--muted);
  margin-top:clamp(14px,1.6vw,26px);transform:rotate(-2deg);opacity:0;animation:fadeIn 1.2s 1.1s var(--ease) forwards}

@keyframes fadeIn{to{opacity:1}}
@keyframes fadeDown{to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="atelier">

  <div class="atelier__logo">
    <h1>PALOMA</h1>
    <p>кофейня</p>
  </div>

  <div class="gal" id="gal">
    <div class="gal__track" id="track"></div>
    <a href="#" class="gal__btn">
      Меню
      <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    </a>
  </div>

  <div class="gal__sign">by PALOMA coffee</div>
</div>

<script>
/* ── Галерейная карусель «как Tilda t-slds (gallery+loop, slow)» ──
   Одна лента едет влево по кругу; центральный кадр крупный,
   а боковые — по убыванию (ближе к центру крупнее, к краям мельче). */
const IMAGES=[
  'coffee/hero','events/event-01','catalog/d1','catalog/d2','catalog/d3',
  'catalog/c9','catalog/h1','catalog/h3'
].map(s=>`images/paloma/${s}.jpg`);

const INTERVAL=1500;   // листать чаще
const DUR=450;
const REPEAT=7;
const base=IMAGES.length;

const gal=document.getElementById('gal');
const track=document.getElementById('track');

const list=[];
for(let r=0;r<REPEAT;r++) list.push(...IMAGES);
track.innerHTML=list.map(src=>`<div class="gal__item"><img src="${src}" alt="" loading="lazy"></div>`).join('');
const items=[...track.children];

let vw,gap,sizes;
function dims(){
  vw=gal.clientWidth;
  gap=Math.round(Math.min(26,Math.max(12,vw*0.013)));
  const A=Math.round(Math.min(460,Math.max(260,vw*0.27)));   // центр (d=0)
  // ширины по убыванию от центра к краям
  sizes=[A, Math.round(A*0.55), Math.round(A*0.40), Math.round(A*0.30), Math.round(A*0.24)];
  gal.style.height=Math.round(A*1.32)+'px';
}
const wFor=d=>sizes[Math.min(d,sizes.length-1)];
const hFor=d=>Math.round(wFor(d)*1.32);

let index=base*3;
function layout(animate){
  track.classList.toggle('is-anim',animate);
  let leftSum=0;
  items.forEach((it,n)=>{
    const d=Math.abs(n-index);
    const w=wFor(d), h=hFor(d);
    it.style.width=w+'px'; it.style.height=h+'px';
    it.style.marginRight=gap+'px';
    it.classList.toggle('is-active',n===index);
    if(n<index) leftSum+=w+gap;
  });
  const activeCenter=leftSum + wFor(0)/2;
  track.style.transform=`translateX(${Math.round(vw/2-activeCenter)}px)`;
}

function tick(){
  index++;
  layout(true);
  if(index>=base*5){
    setTimeout(()=>{ index-=base*2; layout(false); },DUR+30);
  }
}

dims(); layout(false);
let timer=setInterval(tick,INTERVAL);
addEventListener('resize',()=>{dims();layout(false);},{passive:true});
gal.addEventListener('mouseenter',()=>clearInterval(timer));
gal.addEventListener('mouseleave',()=>timer=setInterval(tick,INTERVAL));
</script>
</body>
