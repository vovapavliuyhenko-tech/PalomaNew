  <main class="blog-page" id="main">
    <nav class="breadcrumbs" aria-label="Хлебные крошки">
      <div class="breadcrumbs__inner">
        <ol class="breadcrumbs__list" itemscope itemtype="https://schema.org/BreadcrumbList">
          <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
            <a href="index.html" itemprop="item"><span itemprop="name">Главная</span></a>
            <meta itemprop="position" content="1">
          </li>
          <li class="breadcrumbs__sep" aria-hidden="true">/</li>
          <li itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
            <span itemprop="name">Блог</span>
            <meta itemprop="position" content="2">
          </li>
        </ol>
      </div>
    </nav>

    <section class="blog-hero blog-hero--centered">
      <div class="blog-hero__inner">
        <span class="blog-hero__eyebrow">[ Блог ]</span>
        <h1 class="blog-hero__title">Блог PALOMA</h1>
        <p class="blog-hero__lead">
          Цветы, кофе, уход за букетами и вдохновение для подарков.
        </p>
      </div>
    </section>

    <div class="blog-filters" id="blogFilters">
      <div class="blog-filters__inner">
        <button type="button" class="filter-chip is-active" data-blog-cat="all">Все</button>
        <button type="button" class="filter-chip" data-blog-cat="flowers">Цветы</button>
        <button type="button" class="filter-chip" data-blog-cat="care">Уход</button>
        <button type="button" class="filter-chip" data-blog-cat="gifts">Подарки</button>
        <button type="button" class="filter-chip" data-blog-cat="events">События</button>
      </div>
    </div>

    <section class="blog-grid-section" aria-labelledby="blog-grid-heading">
      <h2 class="visually-hidden" id="blog-grid-heading">Статьи блога</h2>
      <div class="blog-grid" id="blogGrid"></div>
    </section>

    <section class="blog-cta">
      <div class="blog-cta__inner">
        <h2 class="blog-cta__title">Выбрать букет</h2>
        <p class="blog-cta__text">Вдохновились — загляните в каталог или напишите флористу.</p>
        <div class="blog-cta__actions">
          <a href="catalog.html" class="btn btn--dark" data-cursor="hover">В каталог</a>
          <a href="contacts.html" class="btn btn--outline" data-cursor="hover">Связаться с нами</a>
        </div>
      </div>
    </section>
  </main>
